<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My Shop</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f5f5f5;
}

.card {
    background: white;
    margin: 20px auto;
    padding: 20px;
    width: 250px;
    border-radius: 10px;
    box-shadow: 0 0 10px #ccc;
}

button {
    padding: 10px;
    background: black;
    color: white;
    border: none;
    cursor: pointer;
}
</style>

</head>

<body>

<h1>🔥 My Affiliate Shop</h1>

<div class="card">
<h3>Cool LED Light</h3>
<p>$10</p>
<button onclick="buy()">Buy Now</button>
</div>

<script>
function buy() {
    window.location.href = "https://example.com";
}
</script>

</body>
</html>
