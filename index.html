<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Best Budget Finds</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f5f5f5;
}

header {
    background: black;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 22px;
}

.search {
    text-align: center;
    margin: 20px;
}

input {
    padding: 10px;
    width: 60%;
    max-width: 400px;
}

.container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
}

.card {
    background: white;
    margin: 15px;
    padding: 15px;
    width: 220px;
    border-radius: 10px;
    box-shadow: 0 0 10px #ccc;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

.card img {
    width: 100%;
}

button {
    margin-top: 10px;
    padding: 10px;
    background: black;
    color: white;
    border: none;
    cursor: pointer;
}
</style>
</head>

<body>

<header>🔥 Best Budget Finds</header>

<div class="search">
<input type="text" placeholder="Search products...">
</div>

<h2 style="text-align:center;">✨ Trending Products</h2>

<div class="container">

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>LED Light Strip</h3>
<p>$10</p>
<button onclick="window.location.href='LINK_1'">Buy Now</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Desk Lamp</h3>
<p>$20</p>
<button onclick="window.location.href='LINK_2'">Buy Now</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Bluetooth Speaker</h3>
<p>$15</p>
<button onclick="window.location.href='LINK_3'">Buy Now</button>
</div>

</div>

</body>
</html>
